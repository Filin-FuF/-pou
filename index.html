<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 0. исправить чтобы все помещалось на экран
        1. добавить снизу рубашку карт
        2. добавить золотую карту, при выпадении ее открывается ее пара */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
            width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .card {
            aspect-ratio: 1;
            background: #2196F3; 
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            
        }
        
        .card .front, .card .back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .card .front {
            background: #FFC107; 
            display: none;
        }
        
        .card .back {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-size: 30px;
        font-weight: bold;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        
        .card.flipped .front {
            display: flex;
        }
        
        .card.flipped .back {
            display: none;
        }
        
        .card.matched {
            opacity: 0.5;
            cursor: default;
        }
        
        .card.matched .front {
            display: flex;
            background: #4CAF50; 
        }
        
        .card.matched .back {
            display: none;
        }
        
        .card.finished {
            cursor: default;
        }
        
        .card.finished .front {
            display: flex;
        }
        
        .card.finished .back {
            display: none;
        }
        
        .card.golden .back {
        background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%) !important;
        box-shadow: inset 0 0 20px rgba(255,215,0,0.5), 0 0 15px rgba(255,215,0,0.7);
        }

        .card.golden.matched .front {
        background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%) !important;
        box-shadow: 0 0 15px rgba(255,215,0,0.7);
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>память игра</h1>
        
        <div class="controls">
            <button id="startFinishBtn">Start</button>
        </div>
        
        <div class="game-board" id="gameBoard"></div>
        
        <div class="message" id="message"></div>







    
    <script>
        $(document).ready(function() {
            const icons = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊']; //невероятные элементы
            let gameCards = [...icons, ...icons];
            gameCards = gameCards.sort(() => Math.random() - 0.5);
            let firstCard = null;        
            let secondCard = null;       
            let lockBoard = false;       
            let matchedPairs = 0;        
            let gameActive = false; 
            let goldenCard = null;

            const totalPairs = icons.length; //кол-во табличек
            
            function createBoard() {
            
             $('#gameBoard').empty(); //удаляем все элементы
            
             const goldenIndex = Math.floor(Math.random() * icons.length);
    
            $.each(gameCards, function(index, icon) {
            const card = $('<div>').addClass('card');
            card.attr('data-icon', icon);
            card.attr('data-index', index);
        
            // Делаем золотую карту
            if (index === goldenIndex || index === goldenIndex + icons.length) {
            card.addClass('golden');
            goldenCard = card[0]; // сохраняем ссылку
            }
        
            const front = $('<div>').addClass('front').text(icon);
            const back = $('<div>').addClass('back').text('?');
        
            card.append(front, back);
            $('#gameBoard').append(card);
        });
        }
    function resetGame() {
        // перемешиваем карточки заново
        gameCards = [...icons, ...icons].sort(() => Math.random() - 0.5);
        firstCard = null;
        secondCard = null;
        lockBoard = false;
        matchedPairs = 0;
        gameActive = false;
        createBoard();
        $('.card').removeClass('flipped matched finished');
        $('#message').hide().empty();
        $('#startFinishBtn').text('Start');
    }
    function startGame() {
        gameActive = true;
        // переворачиваем все карточки рубашкой вверх
        // убираем класс flipped у всех карточек
        $('.card').removeClass('flipped');
        $('.card').removeClass('finished');
        firstCard = null;
        secondCard = null;
        lockBoard = false;
        $('#startFinishBtn').text('Finish');
    }
    function finishGame() {
        gameActive = false;
        $('.card').addClass('flipped');
        $('.card').addClass('finished');
        $('#startFinishBtn').text('Start');
    }
    function checkMatch() {
        const icon1 = $(firstCard).data('icon');
        const icon2 = $(secondCard).data('icon');
        if (icon1 === icon2) {
            $(firstCard).addClass('matched');
            $(secondCard).addClass('matched');
            matchedPairs++;
            if (matchedPairs === totalPairs) {
                gameActive = false;
                $('#message')
                    .text('🎉 Поздравляем! Вы нашли все пары! 🎉')
                    .show();
                $('#startFinishBtn').text('Start');
            }
            firstCard = null;
            secondCard = null;
            lockBoard = false;
        } else {
            setTimeout(function() {
                $(firstCard).removeClass('flipped');
                $(secondCard).removeClass('flipped');
                firstCard = null;
                secondCard = null;
                lockBoard = false;
            }, 1000); // Задержка 1000 миллисекунд
        }
    }
    //селектор 1
    $('#startFinishBtn').on('click', function() {
        const buttonText = $(this).text();
        if (buttonText === 'Start') {
            resetGame();
            startGame();
        } else {
            finishGame();
        }
    });
    //селектор 2
    $('#gameBoard').on('click', '.card', function() {
    if (!gameActive || lockBoard || $(this).hasClass('flipped') || 
        $(this).hasClass('matched') || $(this).hasClass('finished')) {
        return; 
    }
    
    // ЗОЛОТАЯ КАРТА
    if ($(this).hasClass('golden') && goldenCard) {
        $(this).addClass('flipped');
        const pair = $(goldenCard).hasClass('flipped') ? $(this) : $(goldenCard);
        setTimeout(() => {
            $(pair).addClass('flipped');
            //проверка совпадения
            firstCard = goldenCard;
            secondCard = pair[0];
            lockBoard = true;
            checkMatch();
        }, 300);
        return;
    }
    
    if (firstCard === null) {
        $(this).addClass('flipped');
        firstCard = this;
    } else if (secondCard === null && this !== firstCard) {
        $(this).addClass('flipped');
        secondCard = this;
        lockBoard = true;
        checkMatch();
    }
});

    createBoard();
});



        
    </script>
</body>
</html>
