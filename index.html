<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* 0. исправить чтобы все помещалось на экран
        1. добавить снизу рубашку карт
        2. добавить золотую карту, при выпадении ее открывается ее пара */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .card {
            aspect-ratio: 1;
            background: #2196F3; 
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }
        
        .card .front, .card .back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .card .front {
            background: #FFC107; 
            display: none;
        }
        
        .card .back {
            background: #2196F3;
            color: white;
            font-size: 30px;
            font-weight: bold;
        }
        
        .card.flipped .front {
            display: flex;
        }
        
        .card.flipped .back {
            display: none;
        }
        
        .card.matched {
            opacity: 0.5;
            cursor: default;
        }
        
        .card.matched .front {
            display: flex;
            background: #4CAF50; 
        }
        
        .card.matched .back {
            display: none;
        }
        
        .card.finished {
            cursor: default;
        }
        
        .card.finished .front {
            display: flex;
        }
        
        .card.finished .back {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>память игра</h1>
        
        <div class="controls">
            <button id="startFinishBtn">Start</button>
        </div>
        
        <div class="game-board" id="gameBoard"></div>
        
        <div class="message" id="message"></div>







    
    <script>
        $(document).ready(function() {
            const icons = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊']; //невероятные элементы
            let gameCards = [...icons, ...icons];
            gameCards = gameCards.sort(() => Math.random() - 0.5);
            let firstCard = null;        
            let secondCard = null;       
            let lockBoard = false;       
            let matchedPairs = 0;        
            let gameActive = false; 

            const totalPairs = icons.length; //кол-во табличек
            
            function createBoard() {
            
             $('#gameBoard').empty(); //удаляем все элементы
        
            // перебираем все элементы массива 
            $.each(gameCards, function(index, icon) {
            //создание карты
            const card = $('<div>').addClass('card');
            //создание атрибута иконки для сравнения
            card.attr('data-icon', icon);
            //атрибут индекс
            card.attr('data-index', index);
            
            const front = $('<div>').addClass('front').text(icon);
            const back = $('<div>').addClass('back').text('?');
            
            // собираем карточку: добавляем front и back внутрь card
            card.append(front, back);
            
            // добавляем готовую карточку в игровое поле
            $('#gameBoard').append(card);
        });
    }
    function resetGame() {
        // перемешиваем карточки заново
        gameCards = [...icons, ...icons].sort(() => Math.random() - 0.5);
        firstCard = null;
        secondCard = null;
        lockBoard = false;
        matchedPairs = 0;
        gameActive = false;
        createBoard();
        $('.card').removeClass('flipped matched finished');
        $('#message').hide().empty();
        $('#startFinishBtn').text('Start');
    }
    function startGame() {
        gameActive = true;
        // переворачиваем все карточки рубашкой вверх
        // убираем класс flipped у всех карточек
        $('.card').removeClass('flipped');
        $('.card').removeClass('finished');
        firstCard = null;
        secondCard = null;
        lockBoard = false;
        $('#startFinishBtn').text('Finish');
    }
    function finishGame() {
        gameActive = false;
        $('.card').addClass('flipped');
        $('.card').addClass('finished');
        $('#startFinishBtn').text('Start');
    }
    function checkMatch() {
        const icon1 = $(firstCard).data('icon');
        const icon2 = $(secondCard).data('icon');
        if (icon1 === icon2) {
            $(firstCard).addClass('matched');
            $(secondCard).addClass('matched');
            matchedPairs++;
            if (matchedPairs === totalPairs) {
                gameActive = false;
                $('#message')
                    .text('🎉 Поздравляем! Вы нашли все пары! 🎉')
                    .show();
                $('#startFinishBtn').text('Start');
            }
            firstCard = null;
            secondCard = null;
            lockBoard = false;
        } else {
            setTimeout(function() {
                $(firstCard).removeClass('flipped');
                $(secondCard).removeClass('flipped');
                firstCard = null;
                secondCard = null;
                lockBoard = false;
            }, 1000); // Задержка 1000 миллисекунд
        }
    }
    //селектор 1
    $('#startFinishBtn').on('click', function() {
        const buttonText = $(this).text();
        if (buttonText === 'Start') {
            resetGame();
            startGame();
        } else {
            finishGame();
        }
    });
    //селектор 2
    $('#gameBoard').on('click', '.card', function() {
        if (!gameActive || 
            lockBoard || 
            $(this).hasClass('flipped') || 
            $(this).hasClass('matched') || 
            $(this).hasClass('finished')) {
            return; 
        }
        if (firstCard === null) {
            $(this).addClass('flipped');
            firstCard = this;
        } 
        else if (secondCard === null && this !== firstCard) {
            $(this).addClass('flipped');
            secondCard = this;
            lockBoard = true;
            checkMatch();
        }
    });
    createBoard();
});



        
    </script>
</body>
</html>
