<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
    text-align: center;
    font-family: Arial, sans-serif;
}

.game-board {
    margin: 20px auto;
    width: 600px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.card {
    width: 120px;
    height: 120px;
    perspective: 1000px;
}

.card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s;
}

.card.flipped .card-inner {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    backface-visibility: hidden;
}

.card-front {
    background: #000000;
}

.card-back {
    background: white;
    transform: rotateY(180deg);
}

.matched {
    opacity: 0.5;
}
    </style>
</head>
<body>
    <body>

        <h1>Игра «Память»</h1>
        <button id="controlBtn">Start</button>
        
        <div class="game-board"></div>
        <script>
            $(document).ready(function () {

const symbols = ["✡","✝","☪","☦","☢","☣","⚜","🕉"];

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let gameStarted = false;

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function createBoard() {
    $(".game-board").empty();

    const doubled = shuffle([...symbols, ...symbols]);

    $.each(doubled, function (index, symbol) {

        const card = $(`
            <div class="card" data-symbol="${symbol}">
                <div class="card-inner">
                    <div class="card-face card-front"></div>
                    <div class="card-face card-back">${symbol}</div>
                </div>
            </div>
        `);

        $(".game-board").append(card);
    });
}

function startGame() {
    firstCard = null;
    secondCard = null;
    lockBoard = false;
    gameStarted = true;

    createBoard();

    $("#controlBtn").text("Finish");
}

function finishGame() {

    $(".card").addClass("flipped");
    $(".card").off("click");

    gameStarted = false;
    $("#controlBtn").text("Start");
}

function resetTurn() {
    firstCard = null;
    secondCard = null;
    lockBoard = false;
}

function checkWin() {
    if ($(".matched").length === $(".card").length) {
        setTimeout(function () {
            alert("Игра завершена!");
            finishGame();
        }, 500);
    }
}

$(".game-board").on("click", ".card", function () {

    if (!gameStarted) return;
    if (lockBoard) return;
    if ($(this).hasClass("flipped") || $(this).hasClass("matched")) return;

    $(this).addClass("flipped");

    if (!firstCard) {
        firstCard = $(this);
        return;
    }

    secondCard = $(this);
    lockBoard = true;

    if (firstCard.data("symbol") === secondCard.data("symbol")) {

        firstCard.addClass("matched");
        secondCard.addClass("matched");

        resetTurn();
        checkWin();

    } else {

        setTimeout(function () {
            firstCard.removeClass("flipped");
            secondCard.removeClass("flipped");
            resetTurn();
        }, 2000);
    }
});

$("#controlBtn").click(function () {
    if (!gameStarted) {
        startGame();
    } else {
        finishGame();
    }
});

});
        </script>
</body>
</html>
